name: CodeQL Code Scanning

# Enables GitHub "Code scanning alerts" for AXIM — automatically detects
# common vulnerabilities and coding errors in Python and C/C++.

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master]
  schedule:
    - cron: "0 6 * * 1" # weekly Monday scan

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ${{ matrix.language == 'cpp' && 'macos-latest' || 'ubuntu-latest' }}
    permissions:
      actions: read
      contents: read
      security-events: write # required to upload CodeQL results

    strategy:
      fail-fast: false
      matrix:
        language: [python, cpp]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}

      # C/C++ needs a build for CodeQL to trace. Build the backends.
      # Add the correct SIMD flags per arch so AVX intrinsics compile:
      #   x86_64 → -mavx2 -mfma ;  arm64 → NEON is baseline (no flag)
      - name: Build C/C++ (for CodeQL)
        if: matrix.language == 'cpp'
        run: |
          ARCH=$(uname -m)
          SIMD=""
          if [ "$ARCH" = "x86_64" ]; then SIMD="-mavx2 -mfma"; fi
          echo "Building for arch=$ARCH with SIMD flags: $SIMD"
          cd axim_compiler/backend_cpu && mkdir -p build
          c++ -std=c++14 -O2 $SIMD -fPIC -shared -Iinclude \
            src/axim_cpu.cpp src/axim_blas.cpp src/axim_dnn.cpp \
            -o build/libaxim_cpu.dylib
          cd ../hip
          c++ -std=c++14 -Iinclude src/axim_hip.cpp -c -o /tmp/axim_hip.o

      - name: Autobuild (Python)
        if: matrix.language == 'python'
        uses: github/codeql-action/autobuild@v3

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:${{ matrix.language }}"
