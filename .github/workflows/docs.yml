name: Publish Docs to GitHub Pages

# Builds the AXIM documentation site from docs/ and publishes it to
# GitHub Pages automatically on every push to main.

on:
  push:
    branches: [main, master]
    paths: ["docs/**", "README.md"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install MkDocs
        run: pip install mkdocs mkdocs-material

      - name: Build site
        run: mkdocs build --strict || (echo "mkdocs.yml missing, using docs/ as-is"; mkdir -p site && cp -r docs/* site/ 2>/dev/null || true; cp README.md site/index.md 2>/dev/null || true)

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
